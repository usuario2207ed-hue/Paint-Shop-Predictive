<!DOCTYPE html>
<html lang="pt-BR">

<head>

<link rel="manifest" href="manifest.json">

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ZEC Vision</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f5f5f5;
    padding:15px;
    overflow-x:hidden;
}

.container{
    width:100%;
    max-width:1400px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:25px;
    font-size:clamp(24px, 4vw, 40px);
    animation:cores 5s infinite;
    word-break:break-word;
}

@keyframes cores{

    0%{color:#0066ff;}
    25%{color:#00aa55;}
    50%{color:#ff6600;}
    75%{color:#ff0099;}
    100%{color:#0066ff;}

}

.topo{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    justify-content:center;
    align-items:center;
    margin-bottom:25px;
}

input[type=file]{

    background:#fff;
    padding:12px;
    border-radius:10px;
    border:1px solid #ccc;
    width:100%;
    max-width:350px;

}

button{

    border:none;
    border-radius:10px;
    padding:14px 18px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
    min-width:220px;

}

button:hover{
    transform:scale(1.02);
    opacity:0.9;
}

.btn-carregar{
    background:#0066ff;
    color:#fff;
}

.btn-export{
    background:#00aa55;
    color:#fff;
}

.btn-clear{
    background:#ff4444;
    color:#fff;
}

.card{

    width:100%;
    background:#fff;
    border-radius:15px;
    padding:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.15);
    overflow:hidden;

}

.grafico-container{

    position:relative;
    width:100%;
    height:70vh;
    min-height:350px;

}

canvas{
    width:100% !important;
    height:100% !important;
}

.analise{

    margin-top:25px;
    background:#fff;
    border-radius:15px;
    padding:20px;
    box-shadow:0 0 15px rgba(0,0,0,0.15);

}

.analise h2{
    margin-bottom:20px;
}

.item-analise{

    border-bottom:1px solid #ddd;
    padding:15px 0;
    line-height:1.8;
    word-break:break-word;

}

.status{

    display:inline-flex;
    align-items:center;
    gap:8px;
    font-weight:bold;

}

.bolinha{

    width:16px;
    height:16px;
    border-radius:50%;
    display:inline-block;
    border:1px solid #222;

}

.verde{
    background:#00cc00;
}

.amarelo{
    background:#ffcc00;
}

.vermelho{
    background:#ff0000;
}

.laranja{
    background:#ff6600;
}

.azul{
    background:#0066ff;
}

footer{

    margin-top:30px;
    text-align:center;
    color:#555;
    font-size:14px;

}

@media(max-width:900px){

    .grafico-container{
        height:60vh;
    }

}

@media(max-width:700px){

    body{
        padding:10px;
    }

    .topo{
        flex-direction:column;
    }

    button{
        width:100%;
        min-width:100%;
    }

    input[type=file]{
        max-width:100%;
    }

    .grafico-container{
        height:50vh;
        min-height:300px;
    }

}

</style>

</head>

<body>

<div class="container">

<h1>ZEC Vision 📈</h1>

<div class="topo">

<input type="file"
id="arquivo"
accept=".txt">

<button class="btn-carregar"
onclick="carregarArquivo()">

📥 Carregar Arquivo

</button>

<button class="btn-export"
onclick="exportarAnalise()">

💾 Exportar Gráfico + Análise

</button>

<button class="btn-clear"
onclick="limparHistorico()">

🗑️ Limpar Histórico

</button>

</div>

<div class="card">

<div class="grafico-container">

<canvas id="grafico"></canvas>

</div>

</div>

<div class="analise"
id="analise">

<h2>📋 Análise automática</h2>

Nenhum dado carregado.

</div>

<footer>

Desenvolvido por EdcellTech

</footer>

</div>

<script>

let historico =

JSON.parse(
localStorage.getItem(
"dashboardZEC"
)
) || [];


const ctx =
document.getElementById(
'grafico'
);

const grafico =

new Chart(ctx, {

type:'line',

data:{

labels:[],

datasets:[

{
label:'Visual',
data:[],
borderColor:'blue',
backgroundColor:'blue',
tension:0.3,
borderWidth:3
},

{
label:'Temperatura',
data:[],
borderColor:'orange',
backgroundColor:'orange',
tension:0.3,
borderWidth:3
},

{
label:'Vibração',
data:[],
borderColor:'pink',
backgroundColor:'pink',
tension:0.3,
borderWidth:3
},

{
label:'Corrente',
data:[],
borderColor:'green',
backgroundColor:'green',
tension:0.3,
borderWidth:3
},

{
label:'Limite Inferior ºC',
data:[],
borderColor:'gray',
borderDash:[5,5],
pointRadius:0,
borderWidth:2
},

{
label:'Limite Superior ºC',
data:[],
borderColor:'red',
borderDash:[5,5],
pointRadius:0,
borderWidth:2
}

]

},


options:{

responsive:true,

maintainAspectRatio:false,

interaction:{
    mode:'index',
    intersect:false
},

plugins:{

    legend:{
        position:'top'
    }

},

scales:{

    y:{

        beginAtZero:true,

        ticks:{

            stepSize:10,

            callback:function(value){

                return value + " (°C + mm/s + A) ";

            }

        }

    }

}

}

});


function valorVisual(status){

if(!status){
return 0;
}

status = status.trim();

switch(status){

case "🟢 Normal":
return 1;

case "🟡 Atenção":
return 2;

case "⚠️ Necessita inspeção":
return 3;

case "🛠️ Programar manutenção":
return 4;

case "🔴 Não conforme":
return 5;

default:
return 0;

}

}


function obterStatus(item){

    if(item.visual){

        if(item.visual.includes("Alerta")){

            return {

                texto:"🔴 Alerta",
                classe:"vermelho"

            };

        }

        if(item.visual.includes("Atenção")){

            return {

                texto:"🟡 Atenção",
                classe:"amarelo"

            };

        }

        if(item.visual.includes("Programar manutenção")){

            return {

                texto:"🛠️ Programar manutenção",
                classe:"laranja"

            };

        }

        if(item.visual.includes("Necessita inspeção")){

            return {

                texto:"⚠️ Necessita inspeção",
                classe:"azul"

            };

        }

        if(item.visual.includes("Normal")){

            return {

                texto:"🟢 Normal",
                classe:"verde"

            };

        }

    }


    if(item.temperatura >= 90){

        return {

            texto:"🔴 Alerta",
            classe:"vermelho"

        };

    }

    if(item.temperatura >= 75){

        return {

            texto:"⚠️ Necessita inspeção",
            classe:"azul"

        };

    }


    if(item.vibracao >= 7){

        return {

            texto:"🛠️ Programar manutenção",
            classe:"laranja"

        };

    }


    return {

        texto:"🟢 Normal",
        classe:"verde"

    };

}


function carregarArquivo(){

    const arquivo =

    document.getElementById(
    "arquivo"
    ).files[0];

    if(!arquivo){

        alert(
        "⚠️ Selecione um arquivo TXT."
        );

        return;

    }

    const leitor =
    new FileReader();

    leitor.onload = function(e){

        const texto =
        e.target.result;

        processarTexto(texto);

    };

    leitor.readAsText(
    arquivo,
    'UTF-8'
    );

}


function processarTexto(texto){

    const blocos =

    texto.split(
    "--------------------------------"
    );

    blocos.forEach(bloco=>{

        const data =
        extrair(bloco,"Data/Hora:");

        const equipamento =
        extrair(bloco,"Equipamento:");

        if(!data || !equipamento){
            return;
        }

        const visual =
        extrair(bloco,"Visual:");

        const temperatura =
        parseFloat(
        extrair(bloco,"Temperatura:")
        ) || 0;

        const vibracao =
        parseFloat(
        extrair(bloco,"Vibração:")
        ) || 0;

        const corrente =
        parseFloat(
        extrair(bloco,"Corrente:")
        ) || 0;


        const chave =

        data + "_" +
        equipamento + "_" +
        temperatura + "_" +
        vibracao + "_" +
        corrente;


        const existe =

        historico.some(
        item => item.chave === chave
        );

        if(existe){
            return;
        }


        historico.push({

            chave,
            data,
            equipamento,
            visual,
            temperatura,
            vibracao,
            corrente

        });

    });


    localStorage.setItem(

        "dashboardZEC",

        JSON.stringify(historico)

    );


    atualizarGrafico();

}


function extrair(texto,campo){

const regex =

new RegExp(
campo + "\\s*(.*)"
);

const resultado =
texto.match(regex);

if(resultado){

return resultado[1]

.replace("°C","")
.replace("mm/s","")
.replace("A","")
.trim();

}

return "";

}


function converterData(data){

if(!data){
return new Date();
}

const partes =
data.split(" ");

if(partes.length < 2){
return new Date();
}

const dataParte =
partes[0];

const horaParte =
partes[1];

return new Date(

dataParte
.split("/")
.reverse()
.join("-")

+ "T" +

horaParte

);

}

function atualizarGrafico(){

historico.sort((a,b)=>{

return converterData(a.data)
-
converterData(b.data);

});


grafico.data.labels =

historico.map(item=>{

const partes =
item.data.split(" ");

const data =
partes[0];

const hora =
partes[1];

return data.substring(0,5)
+ " "
+ hora.substring(0,5);

});


grafico.data.datasets[0].data =

historico.map(item=>
valorVisual(item.visual)
);

grafico.data.datasets[1].data =

historico.map(item=>
item.temperatura
);

grafico.data.datasets[2].data =

historico.map(item=>
item.vibracao
);

grafico.data.datasets[3].data =

historico.map(item=>
item.corrente
);

grafico.data.datasets[4].data =

historico.map(()=>20);

grafico.data.datasets[5].data =

historico.map(()=>90);

grafico.update();

gerarAnalise();

}


function gerarAnalise(){

const analise =
document.getElementById(
"analise"
);

if(historico.length === 0){

analise.innerHTML =

`
<h2>📋 Análise automática</h2>

Nenhum dado carregado.
`;

return;

}

let html =
"<h2>📋 Análise automática</h2>";

historico.forEach(item=>{

const status =
obterStatus(item);

html += `

<div class="item-analise">

<b>${item.equipamento}</b>

<br><br>

📅 ${item.data}<br>

🌡️ Temperatura:
${item.temperatura} °C<br>

📈 Vibração:
${item.vibracao} mm/s<br>

⚡ Corrente:
${item.corrente} A<br>

<div class="status">

<span class="bolinha ${status.classe}"></span>

${status.texto}

</div>

</div>

`;

});

analise.innerHTML = html;

}


function exportarAnalise(){

const texto =

document.getElementById(
"analise"
).innerText;

if(!texto){

alert(
"⚠️ Nenhuma análise encontrada."
);

return;

}

const blob =

new Blob(
[texto],
{type:"text/plain"}
);

const link =

document.createElement("a");

link.href =
URL.createObjectURL(blob);

link.download =
"Analise_Dashboard_ZEC.txt";

link.click();

}


function limparHistorico(){

const confirmar =

confirm(

"⚠️ Tem certeza que deseja apagar todo o histórico?"

);

if(!confirmar){
return;
}

const senha =

prompt(

`🔒 Somente o desenvolvedor Edmilson tem acesso.

Digite a senha:`

);

if(senha === "123456"){

localStorage.removeItem(
"dashboardZEC"
);

historico = [];

grafico.data.labels = [];

grafico.data.datasets.forEach(
dataset => {

dataset.data = [];

}
);

grafico.update();

gerarAnalise();

alert(
"✅ Histórico apagado."
);

}else{

alert(
"❌ Senha incorreta."
);

}

}

atualizarGrafico();

</script>

<script>

let deferredPrompt;

window.addEventListener(
'beforeinstallprompt',

(e)=>{

e.preventDefault();

deferredPrompt = e;

mostrarBotaoInstalar();

});

function mostrarBotaoInstalar(){

if(document.getElementById(
"btnInstalar"
)) return;

const botao =
document.createElement("button");

botao.id = "btnInstalar";

botao.innerHTML =
"📲 Instalar Aplicativo";

botao.style.position = "fixed";
botao.style.bottom = "20px";
botao.style.right = "20px";
botao.style.padding = "14px 20px";
botao.style.border = "none";
botao.style.borderRadius = "12px";
botao.style.background = "#0066ff";
botao.style.color = "#fff";
botao.style.fontSize = "16px";
botao.style.fontWeight = "bold";
botao.style.cursor = "pointer";
botao.style.zIndex = "9999";
botao.style.boxShadow =
"0 0 10px rgba(0,0,0,0.3)";

botao.onclick = async ()=>{

if(deferredPrompt){

deferredPrompt.prompt();

await deferredPrompt.userChoice;

deferredPrompt = null;

botao.remove();

}

};

document.body.appendChild(botao);

}

if('serviceWorker' in navigator){

navigator.serviceWorker
.register('sw.js')

.then(()=>{

console.log(
'Service Worker registrado'
);

})
.catch((erro)=>{

console.log(
'Erro Service Worker:',
erro
);

});

}

</script>

</body>
</html>
